default_provider: "openrouter_free"

timeout:
  researcher: 240
  analyst: 180
  writer: 360
  critic: 180
  default: 240

temperature:
  researcher: 0.1
  analyst: 0.1
  writer: 0.3
  critic: 0.0

context_length:
  default: 16000
  researcher: 16000
  analyst: 16000
  writer: 16000
  critic: 16000

writer_input:
  max_research_chars: 16000
  max_analysis_chars: 16000
  max_correction_chars: 4000

researcher:
  model: "z-ai/glm-4.5-air:free"
  provider: openrouter

analyst:
  model: "meta-llama/llama-3.3-70b-instruct:free"
  provider: openrouter

writer:
  model: "openai/gpt-oss-120b:free"
  provider: openrouter

critic:
  model: "gemma4:26b"
  provider: ollama

critic_fast:
  model: "qwen2.5:7b-instruct-q5_K_M"
  provider: ollama

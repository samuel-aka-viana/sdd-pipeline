article:
  required_sections:
    - tldr
    - o_que_e
    - requisitos
    - instalacao
    - configuracao
    - exemplo_pratico
    - armadilhas
    - otimizacoes
    - conclusao
    - referencias

  quality_rules:
    no_placeholders:
      patterns:
        # placeholders explícitos
        - "[Descreva"
        - "[TODO"
        - "[X]"
        - "[inserir"
        - "[preencher"
        - "PREENCHER"
        # comentários bash genéricos (solução vazia disfarçada)
        - "# Verifique"
        - "# Ajuste"
        - "# Configure"
        - "# Corrija"
        - "# Substitua"
        # frases genéricas que escondem falta de dado
        - "conforme necessário"
        - "configura corretamente"
        - "de acordo com suas necessidades"
        - "consulte a documentação oficial"
        - "verifique a documentação"
        - "dependendo do seu ambiente"
        - "ajuste conforme seu caso"
      message: "Seção contém placeholder ou frase genérica não preenchida"

    min_references: 3
    min_errors: 2
    min_tips: 3

    min_solution_chars: 20

    hardware_sanity:
      max_ram_minimum_gb: 2
      message: "RAM mínimo acima de 2GB é provavelmente errado para k3s/microk8s"

    url_validation:
      must_start_with: "https://"
      block_patterns:
        - "example.com"
        - "seu-repositorio"
        - "docs.example"
        - "localhost"

research:
  required_fields:
    - urls
    - instalacao
    - requisitos
    - erros
    - alternativas

  search_queries:
    - "{tool} minimum requirements RAM CPU"
    - "{tool} installation official docs"
    - "{tool} install docker-compose site:github.com"
    - "{tool} common errors site:stackoverflow.com"
    - "{tool} vs {alternative} comparison"
    - "{tool} getting started tutorial"

  scraper:
    max_chars_per_page: 4000
    max_scrapes_per_tool: 10
    timeout_seconds: 15
    skip_domains:
      - "youtube.com"
      - "youtu.be"
      - "twitter.com"
      - "x.com"
      - "facebook.com"
      - "instagram.com"
      - "tiktok.com"
      - "pinterest.com"

analysis:
  required_fields:
    - tabela_requisitos
    - tabela_comparacao
    - pros
    - contras
    - otimizacoes

models:
  researcher: "glm-5.1:cloud"
  analyst:    "glm-5.1:cloud"
  writer:     "glm-4.7-flash:q4_K_M"
  critic:     "glm-4.7-flash:q4_K_M"

#models: para rodar em batatas
#  researcher: "gemma4:e2b"
#  analyst:    "gemma4:e2b"
#  writer:     "gemma4:e4b"
#  critic:     "gemma4:e2b"

ollama:
  base_url: "http://localhost:11434"
  timeout:
    researcher: 300
    analyst:    300
    writer:     3200
    critic:    3200
    default:   600
  temperature:
    researcher: 0.1
    analyst:    0.1
    writer:     0.3
    critic:     0.0
  context_length:
    default: 8192
    writer:  16384
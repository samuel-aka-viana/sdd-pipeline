article:
  required_sections:
    - tldr
    - o_que_e
    - requisitos
    - instalacao
    - configuracao
    - exemplo_pratico
    - armadilhas
    - otimizacoes
    - conclusao
    - referencias

  quality_rules:
    no_placeholders:
      patterns:
        # placeholders explícitos
        - "[Descreva"
        - "[TODO"
        - "[X]"
        - "[inserir"
        - "[preencher"
        - "PREENCHER"
        # comentários bash genéricos (solução vazia disfarçada)
        - "# Verifique"
        - "# Ajuste"
        - "# Configure"
        - "# Corrija"
        - "# Substitua"
        # frases genéricas que escondem falta de dado
        - "conforme necessário"
        - "configura corretamente"
        - "de acordo com suas necessidades"
        - "consulte a documentação oficial"
        - "verifique a documentação"
        - "dependendo do seu ambiente"
        - "ajuste conforme seu caso"
      message: "Seção contém placeholder ou frase genérica não preenchida"

    min_references: 3
    min_errors: 2
    min_tips: 3

    min_solution_chars: 20

    hardware_sanity:
      max_ram_minimum_gb: 2
      message: "RAM mínimo acima de 2GB é provavelmente errado para k3s/microk8s"

    url_validation:
      must_start_with: "https://"
      block_patterns:
        - "example.com"
        - "seu-repositorio"
        - "docs.example"
        - "localhost"

research:
  required_fields:
    - urls
    - instalacao
    - requisitos
    - erros
    - alternativas

  search_queries:
    - "{tool} minimum requirements RAM CPU"
    - "{tool} installation official docs"
    - "{tool} install docker-compose site:github.com"
    - "{tool} common errors site:stackoverflow.com"
    - "{tool} vs {alternative} comparison"
    - "{tool} getting started tutorial"

  scraper:
    max_chars_per_page: 4000
    max_scrapes_per_tool: 10
    timeout_seconds: 15
    skip_domains:
      - "youtube.com"
      - "youtu.be"
      - "twitter.com"
      - "x.com"
      - "facebook.com"
      - "instagram.com"
      - "tiktok.com"
      - "pinterest.com"

analysis:
  required_fields:
    - tabela_requisitos
    - tabela_comparacao
    - pros
    - contras
    - otimizacoes

pipeline:
  # timeout global da execução inteira (segundos).
  # null/descomente para desabilitar limite total.
  timeout_total_seconds: 900

# ── Modelos ──────────────────────────────────────────────────────
# Fonte principal: .env (LLM_MODEL_RESEARCHER/ANALYST/WRITER/CRITIC)
# Este bloco fica como fallback caso as variáveis não existam.

# ── Opção 1: OpenRouter free (ATUAL — descomentado) ─────────────
models:
  researcher: "z-ai/glm-4.5-air:free"
  analyst:    "z-ai/glm-4.5-air:free"
  writer:     "z-ai/glm-4.5-air:free"
  critic:     "z-ai/glm-4.5-air:free"

# ── Opção 2: Ollama local ───────────────────────────────────────
# 3a) 8 GB RAM, CPU only (descomente para usar)
# models:
#   researcher: "gemma3:4b"
#   analyst:    "gemma3:4b"
#   writer:     "gemma3:12b"
#   critic:     "gemma3:4b"
#
# 3b) 16 GB RAM, CPU only (descomente para usar)
# models:
#   researcher: "gemma3:12b"
#   analyst:    "gemma3:12b"
#   writer:     "qwen3:14b"
#   critic:     "gemma3:12b"
#
# 3c) 32 GB RAM + 8 GB VRAM (descomente para usar)
# models:
#   researcher: "qwen3:8b"
#   analyst:    "qwen3:8b"
#   writer:     "qwen3:30b-a3b"
#   critic:     "qwen3:8b"

# ── LLM ──────────────────────────────────────────────────────────
# Fonte principal: .env (LLM_PROVIDER)
# Valores suportados no .env:
#   ollama_local | ollama_cloud | openrouter_free
# Campo abaixo é fallback para manter compatibilidade.

llm:
  provider: "openrouter_free"
  timeout:
    researcher: 600
    analyst:    600
    writer:     600
    critic:     600
    default:   600
  temperature:
    researcher: 0.1
    analyst:    0.1
    writer:     0.3
    critic:     0.0
  context_length:
    default: 8192
    writer:  16384
  providers:
    openrouter:
      base_url: "https://openrouter.ai/api/v1"
      api_key_env: "OPENROUTER_API_KEY"
      app_name: "SDD Tech Writer"
      site_url: ""
    ollama:
      base_url: "http://localhost:11434"
